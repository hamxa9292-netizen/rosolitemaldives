<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF7F8; --card:#FFFFFF; --ink:#17252A; --ink-soft:#5A6B70;
    --line:#EADFE3; --teal:#A8385D; --teal-dark:#86294A; --teal-tint:#F8E9EF;
    --mango:#E9B44C; --red:#B4432F;
    --radius:12px; --shadow:0 6px 18px rgba(23,37,42,.08);
  }
  *{box-sizing:border-box; margin:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Inter',system-ui,sans-serif; font-size:15px; line-height:1.5;
    padding-bottom:90px;
  }
  button{font-family:inherit; cursor:pointer}
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
    outline:2px solid var(--teal); outline-offset:2px;
  }
  img{max-width:100%; display:block}

  /* ---------- header ---------- */
  header{
    background:var(--card); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20; padding:14px 16px 10px;
  }
  .brand{display:flex; justify-content:space-between; align-items:center; gap:10px}
  .brand h1{
    font-family:'Bricolage Grotesque',sans-serif; font-weight:700;
    font-size:clamp(20px,5vw,26px); letter-spacing:-0.01em;
  }
  .brand p{color:var(--ink-soft); font-size:12.5px; margin-top:2px}
  #cartBtn{
    background:var(--teal); color:#fff; border:none; border-radius:999px;
    padding:10px 16px; font-weight:700; font-size:14px; display:flex; gap:8px; align-items:center;
    flex-shrink:0;
  }
  #cartBtn:hover{background:var(--teal-dark)}
  #cartCount{
    background:var(--mango); color:var(--ink); border-radius:999px;
    min-width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; padding:0 6px;
  }

  /* ---------- search + categories ---------- */
  .toolbar{padding:10px 0 2px}
  #search{
    width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:var(--radius);
    font-size:15px; background:var(--bg);
  }
  .chips{display:flex; gap:8px; overflow-x:auto; padding:10px 0 6px; -webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    border:1px solid var(--line); background:var(--card); color:var(--ink-soft);
    border-radius:999px; padding:7px 14px; font-size:13.5px; font-weight:600; white-space:nowrap;
  }
  .chip.on{background:var(--teal); border-color:var(--teal); color:#fff}

  /* ---------- product grid ---------- */
  main{max-width:1080px; margin:0 auto; padding:16px}
  .section-title{
    font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:18px;
    margin:18px 0 10px; display:flex; align-items:baseline; gap:8px;
  }
  .section-title small{font-family:'Inter'; font-weight:500; color:var(--ink-soft); font-size:12.5px}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px}
  @media(min-width:700px){ .grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px} }
  .product{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; display:flex; flex-direction:column;
  }
  .thumb{
    aspect-ratio:1/1; background:var(--teal-tint); display:flex; align-items:center;
    justify-content:center; font-size:44px;
  }
  .thumb img{width:100%; height:100%; object-fit:cover}
  .pbody{padding:10px 12px 12px; display:flex; flex-direction:column; gap:4px; flex:1}
  .pname{font-weight:600; font-size:14px; line-height:1.3}
  .pdesc{color:var(--ink-soft); font-size:12.5px; flex:1}
  .prow{display:flex; justify-content:space-between; align-items:center; margin-top:8px; gap:8px}
  .price{font-weight:700; font-size:15px}
  .price small{font-weight:600; color:var(--ink-soft); font-size:11px}
  .add{
    background:var(--teal-tint); color:var(--teal); border:none; border-radius:8px;
    width:34px; height:34px; font-size:20px; font-weight:700; line-height:1;
  }
  .add:hover{background:var(--teal); color:#fff}
  .qty-ctrl{display:flex; align-items:center; gap:8px}
  .qty-ctrl button{
    background:var(--teal); color:#fff; border:none; border-radius:8px;
    width:30px; height:30px; font-size:17px; font-weight:700; line-height:1;
  }
  .qty-ctrl span{font-weight:700; min-width:18px; text-align:center}
  .oos{color:var(--red); font-weight:600; font-size:12.5px}
  .empty-msg{color:var(--ink-soft); text-align:center; padding:50px 20px}

  /* ---------- cart drawer ---------- */
  #overlay{
    position:fixed; inset:0; background:rgba(23,37,42,.45); z-index:30;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  #overlay.show{opacity:1; pointer-events:auto}
  #drawer{
    position:fixed; top:0; right:0; bottom:0; width:min(420px,100%); background:var(--card);
    z-index:40; transform:translateX(100%); transition:transform .25s ease;
    display:flex; flex-direction:column; box-shadow:var(--shadow);
  }
  #drawer.show{transform:translateX(0)}
  .drawer-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 18px; border-bottom:1px solid var(--line);
  }
  .drawer-head h2{font-family:'Bricolage Grotesque',sans-serif; font-size:19px}
  .close{background:none; border:none; font-size:22px; color:var(--ink-soft); padding:4px 8px}
  .drawer-body{flex:1; overflow-y:auto; padding:14px 18px}
  .citem{
    display:flex; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid var(--line);
  }
  .citem .ci-emoji{font-size:24px; width:36px; text-align:center}
  .citem .ci-info{flex:1; min-width:0}
  .citem .ci-name{font-weight:600; font-size:13.5px}
  .citem .ci-price{color:var(--ink-soft); font-size:12.5px}
  .remove{background:none; border:none; color:var(--red); font-size:12px; font-weight:600; padding:2px 0}
  .drawer-foot{border-top:1px solid var(--line); padding:14px 18px 18px}
  .totline{display:flex; justify-content:space-between; font-size:14px; margin-bottom:6px; color:var(--ink-soft)}
  .totline.grand{font-size:17px; font-weight:700; color:var(--ink); border-top:1px dashed var(--line); padding-top:8px; margin-top:4px}
  .warn{
    background:#FDF3E3; border:1px solid #F0D9A8; border-radius:8px;
    padding:8px 12px; font-size:12.5px; margin:8px 0;
  }
  .primary{
    width:100%; background:var(--teal); color:#fff; border:none; border-radius:999px;
    padding:14px; font-size:15px; font-weight:700; margin-top:10px;
  }
  .primary:hover{background:var(--teal-dark)}
  .primary:disabled{opacity:.5; cursor:not-allowed}

  /* ---------- checkout ---------- */
  .field{margin-bottom:12px}
  .field label{display:block; font-weight:600; font-size:13px; margin-bottom:4px}
  .field input, .field select, .field textarea{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px;
    font-size:15px; font-family:inherit; background:var(--bg);
  }
  .paychoice{display:flex; gap:8px}
  .paychoice button{
    flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:10px;
    padding:12px 8px; font-weight:600; font-size:13.5px;
  }
  .paychoice button.on{border-color:var(--teal); background:var(--teal-tint); color:var(--teal)}

  /* ---------- confirmation ---------- */
  .confirm{text-align:center; padding:8px 4px}
  .confirm .big{font-size:40px; margin-bottom:6px}
  .confirm h3{font-family:'Bricolage Grotesque',sans-serif; font-size:19px; margin-bottom:6px}
  .ordernum{
    display:inline-block; background:var(--teal-tint); color:var(--teal); font-weight:700;
    border-radius:8px; padding:6px 14px; margin:6px 0 10px; font-size:15px; letter-spacing:.03em;
  }
  .confirm p{color:var(--ink-soft); font-size:13.5px; margin-bottom:10px}
  .qrbox{margin:10px auto; max-width:240px; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
  .wa{
    display:block; background:#25D366; color:#fff; text-decoration:none; border-radius:999px;
    padding:13px; font-weight:700; font-size:15px; margin-top:10px;
  }

  /* ---------- footer bar ---------- */
  .footbar{
    position:fixed; bottom:0; left:0; right:0; background:var(--card);
    border-top:1px solid var(--line); padding:10px 16px; z-index:15;
    display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .footbar .note{font-size:12px; color:var(--ink-soft)}
  .footbar .go{
    background:var(--mango); color:var(--ink); border:none; border-radius:999px;
    padding:11px 18px; font-weight:700; font-size:14px; white-space:nowrap;
  }
  /* ---------- badges ---------- */
  .badge{
    position:absolute; top:8px; left:8px; z-index:2; border-radius:999px;
    padding:3px 10px; font-size:11px; font-weight:700; letter-spacing:.02em;
  }
  .badge.Bestseller{background:var(--mango); color:var(--ink)}
  .badge.New{background:var(--teal); color:#fff}
  .badge.LowStock{background:#B4432F; color:#fff}
  .thumb{position:relative}

  /* ---------- product detail modal ---------- */
  #pmodal{
    position:fixed; inset:0; z-index:50; display:none; align-items:flex-end; justify-content:center;
  }
  #pmodal.show{display:flex}
  #pmodal .pm-back{position:absolute; inset:0; background:rgba(23,37,42,.5)}
  .pm-sheet{
    position:relative; background:var(--card); width:100%; max-width:560px;
    max-height:92vh; border-radius:16px 16px 0 0; display:flex; flex-direction:column;
    animation:pm-up .22s ease;
  }
  @media(min-width:600px){ #pmodal{align-items:center; padding:20px} .pm-sheet{border-radius:16px; max-height:86vh} }
  @keyframes pm-up{from{transform:translateY(24px); opacity:.6}to{transform:translateY(0); opacity:1}}
  .pm-close{
    position:absolute; top:10px; right:10px; z-index:3; background:var(--card); border:1px solid var(--line);
    border-radius:999px; width:34px; height:34px; font-size:16px; color:var(--ink-soft);
  }
  .pm-scroll{overflow-y:auto; padding-bottom:8px}
  .pm-hero{
    aspect-ratio:1/1; max-height:320px; width:100%; background:var(--teal-tint);
    display:flex; align-items:center; justify-content:center; font-size:80px; position:relative;
  }
  .pm-hero img{width:100%; height:100%; object-fit:contain; background:#fff}
  .pm-thumbs{display:flex; gap:8px; padding:10px 16px 0; overflow-x:auto}
  .pm-thumbs button{
    width:52px; height:52px; border-radius:8px; border:2px solid var(--line); background:var(--teal-tint);
    overflow:hidden; font-size:22px; flex-shrink:0; padding:0;
  }
  .pm-thumbs button.on{border-color:var(--teal)}
  .pm-thumbs img{width:100%; height:100%; object-fit:cover}
  .pm-body{padding:14px 18px 6px}
  .pm-body h2{font-family:'Bricolage Grotesque',sans-serif; font-size:21px; line-height:1.25}
  .pm-price{font-weight:700; font-size:19px; margin:6px 0 2px}
  .pm-stock{font-size:13px; font-weight:600; margin-bottom:8px}
  .pm-stock.in{color:#1E7A4F}
  .pm-stock.out{color:var(--red)}
  .pm-desc{color:var(--ink-soft); font-size:14.5px; margin-bottom:10px}
  .pm-benefits{margin:0 0 12px 0; padding:0; list-style:none}
  .pm-benefits li{font-size:14px; padding:3px 0 3px 24px; position:relative}
  .pm-benefits li::before{content:"✓"; position:absolute; left:2px; color:var(--teal); font-weight:700}
  .pm-specs{width:100%; border-collapse:collapse; font-size:13.5px; margin-bottom:12px}
  .pm-specs td{border-top:1px solid var(--line); padding:7px 4px; vertical-align:top}
  .pm-specs td:first-child{color:var(--ink-soft); width:38%}
  .pm-trust{
    background:var(--bg); border:1px solid var(--line); border-radius:10px;
    padding:10px 14px; font-size:12.5px; color:var(--ink-soft); margin-bottom:12px;
  }
  .pm-trust div{padding:2px 0}
  .pm-trust a{color:var(--teal); font-weight:600; text-decoration:none}
  .pm-related h3{font-family:'Bricolage Grotesque',sans-serif; font-size:15px; margin:4px 0 8px}
  .pm-related .rel-row{display:flex; gap:10px; overflow-x:auto; padding-bottom:6px}
  .rel-card{
    flex:0 0 120px; border:1px solid var(--line); border-radius:10px; overflow:hidden;
    background:var(--card); cursor:pointer; text-align:left; padding:0;
  }
  .rel-card .rt{aspect-ratio:1/1; background:var(--teal-tint); display:flex; align-items:center; justify-content:center; font-size:30px}
  .rel-card .rt img{width:100%; height:100%; object-fit:cover}
  .rel-card .rn{font-size:12px; font-weight:600; padding:6px 8px 0; line-height:1.25}
  .rel-card .rp{font-size:12px; font-weight:700; padding:2px 8px 8px}
  .pm-cta{
    position:sticky; bottom:0; background:var(--card); border-top:1px solid var(--line);
    padding:12px 18px; display:flex; gap:10px; align-items:center;
  }
  .pm-cta .primary{margin-top:0; flex:1}
  .pm-cta .qty-ctrl{flex-shrink:0}

  /* ---------- product detail modal ---------- */
  .product{cursor:pointer; position:relative}
  .badge-tag{
    position:absolute; top:8px; left:8px; background:var(--mango); color:var(--ink);
    font-size:11px; font-weight:700; border-radius:999px; padding:3px 9px; z-index:2;
  }
  #pmOverlay{
    position:fixed; inset:0; background:rgba(23,37,42,.5); z-index:50;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  #pmOverlay.show{opacity:1; pointer-events:auto}
  #pmodal{
    position:fixed; z-index:60; background:var(--card);
    inset:auto 0 0 0; max-height:92vh; border-radius:16px 16px 0 0;
    transform:translateY(105%); transition:transform .25s ease;
    display:flex; flex-direction:column; overflow:hidden;
  }
  @media(min-width:700px){
    #pmodal{inset:4vh 0 auto 50%; transform:translate(-50%,20px); width:min(560px,94%);
      border-radius:16px; max-height:88vh; opacity:0; pointer-events:none}
    #pmodal.show{transform:translate(-50%,0); opacity:1; pointer-events:auto}
  }
  @media(max-width:699.9px){ #pmodal.show{transform:translateY(0)} }
  .pm-close{
    position:absolute; top:10px; right:10px; z-index:3; background:var(--card);
    border:1px solid var(--line); border-radius:999px; width:36px; height:36px;
    font-size:16px; color:var(--ink-soft);
  }
  .pm-scroll{overflow-y:auto; padding-bottom:8px}
  .pm-hero{
    aspect-ratio:4/3; background:var(--teal-tint); display:flex; align-items:center;
    justify-content:center; font-size:84px; position:relative;
  }
  .pm-hero img{width:100%; height:100%; object-fit:contain; background:#fff}
  .pm-thumbs{display:flex; gap:8px; padding:10px 16px 0; overflow-x:auto}
  .pm-thumbs button{
    width:54px; height:54px; border-radius:8px; border:2px solid var(--line);
    overflow:hidden; padding:0; background:var(--teal-tint); flex-shrink:0; font-size:22px;
  }
  .pm-thumbs button.on{border-color:var(--teal)}
  .pm-thumbs img{width:100%; height:100%; object-fit:cover}
  .pm-body{padding:14px 16px 4px}
  .pm-body h2{font-family:'Bricolage Grotesque',sans-serif; font-size:21px; margin-bottom:2px}
  .pm-cat{color:var(--ink-soft); font-size:12.5px; margin-bottom:6px}
  .pm-price{font-size:20px; font-weight:700; margin:4px 0 8px}
  .pm-desc{color:var(--ink-soft); font-size:14px; margin-bottom:10px}
  .pm-benefits{list-style:none; padding:0; margin:0 0 12px}
  .pm-benefits li{
    padding-left:24px; position:relative; font-size:14px; margin-bottom:6px;
  }
  .pm-benefits li::before{content:"✓"; position:absolute; left:2px; color:var(--teal); font-weight:700}
  .pm-specs{width:100%; border-collapse:collapse; font-size:13.5px; margin-bottom:12px}
  .pm-specs td{border-top:1px solid var(--line); padding:7px 4px; vertical-align:top}
  .pm-specs td:first-child{color:var(--ink-soft); width:42%}
  .pm-trust{
    display:flex; gap:6px; flex-wrap:wrap; margin:2px 0 12px;
  }
  .pm-trust span{
    background:var(--bg); border:1px solid var(--line); border-radius:999px;
    font-size:11.5px; padding:5px 10px; color:var(--ink-soft);
  }
  .pm-related h3{font-family:'Bricolage Grotesque',sans-serif; font-size:15px; margin:4px 0 8px}
  .pm-related-row{display:flex; gap:10px; overflow-x:auto; padding-bottom:6px}
  .pm-rel{
    min-width:120px; max-width:120px; border:1px solid var(--line); border-radius:10px;
    padding:8px; cursor:pointer; background:var(--card);
  }
  .pm-rel .re{font-size:26px; text-align:center}
  .pm-rel .rn{font-size:12px; font-weight:600; line-height:1.25; margin:4px 0 2px}
  .pm-rel .rp{font-size:12.5px; font-weight:700}
  .pm-bar{
    border-top:1px solid var(--line); background:var(--card); padding:12px 16px;
    display:flex; gap:10px; align-items:center;
  }
  .pm-bar .qty-ctrl button{width:38px; height:38px}
  .pm-add{
    flex:1; background:var(--teal); color:#fff; border:none; border-radius:999px;
    padding:13px; font-size:15px; font-weight:700;
  }
  .pm-add:hover{background:var(--teal-dark)}
  .pm-add:disabled{opacity:.5; cursor:not-allowed}
  @media(prefers-reduced-motion:reduce){
    *{transition:none !important; animation:none !important}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div>
      <h1 id="shopName">Store</h1>
      <p id="tagline"></p>
    </div>
    <button id="cartBtn" aria-label="Open basket">
      Basket <span id="cartCount">0</span>
    </button>
  </div>
  <div class="toolbar">
    <input id="search" type="search" placeholder="Search products…" aria-label="Search products">
    <div class="chips" id="chips" role="tablist"></div>
  </div>
</header>

<main id="catalog"></main>

<div class="footbar" id="footbar" hidden>
  <span class="note" id="footNote"></span>
  <button class="go" id="footGo">View basket</button>
</div>

<div id="pmodal" aria-label="Product details">
  <div class="pm-back" onclick="closeProduct()"></div>
  <div class="pm-sheet" id="pmSheet"></div>
</div>

<div id="overlay"></div>
<aside id="drawer" aria-label="Basket">
  <div class="drawer-head">
    <h2 id="drawerTitle">Your basket</h2>
    <button class="close" id="closeDrawer" aria-label="Close">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot" id="drawerFoot"></div>
</aside>

<div id="pmOverlay"></div>
<div id="pmodal" role="dialog" aria-modal="true" aria-label="Product details">
  <button class="pm-close" id="pmClose" aria-label="Close">✕</button>
  <div class="pm-scroll" id="pmScroll"></div>
  <div class="pm-bar" id="pmBar"></div>
</div>

<script src="config.js"></script>
<script src="products.js"></script>
<script>
/* ================= state ================= */
let cart = {};                       // sku -> qty
let activeCategory = "All";
let searchTerm = "";
let drawerMode = "cart";             // cart | checkout | confirm
let lastOrder = null;

try { cart = JSON.parse(localStorage.getItem("cart") || "{}"); } catch(e){ cart = {}; }
const saveCart = () => { try { localStorage.setItem("cart", JSON.stringify(cart)); } catch(e){} };

const $ = id => document.getElementById(id);
const money = n => `${n.toLocaleString()} <small>${CONFIG.currency}</small>`;
const moneyPlain = n => `${CONFIG.currency} ${n.toLocaleString()}`;
const bySku = sku => PRODUCTS.find(p => p.sku === sku);

/* ================= header ================= */
document.title = CONFIG.shopName;
$("shopName").textContent = CONFIG.shopName;
$("tagline").textContent = CONFIG.tagline;

/* ================= categories ================= */
function renderChips(){
  const cats = ["All", ...CATEGORIES];
  $("chips").innerHTML = cats.map(c =>
    `<button class="chip ${c===activeCategory?"on":""}" data-cat="${c}">${c}</button>`
  ).join("");
  $("chips").querySelectorAll(".chip").forEach(b =>
    b.onclick = () => { activeCategory = b.dataset.cat; renderChips(); renderCatalog(); }
  );
}

/* ================= catalog ================= */
const mainImage = p => (p.images && p.images[0]) || p.image || "";

function productCard(p){
  const qty = cart[p.sku] || 0;
  const src = mainImage(p);
  const img = src
    ? `<img src="${src}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='${p.emoji}'">`
    : p.emoji;
  const action = !p.inStock
    ? `<span class="oos">Out of stock</span>`
    : qty === 0
      ? `<button class="add" data-sku="${p.sku}" aria-label="Add ${p.name}">+</button>`
      : `<div class="qty-ctrl">
           <button data-dec="${p.sku}" aria-label="Remove one">−</button>
           <span>${qty}</span>
           <button data-inc="${p.sku}" aria-label="Add one">+</button>
         </div>`;
  return `<div class="product" data-view="${p.sku}">
    ${p.badge ? `<span class="badge-tag">${p.badge}</span>` : ""}
    <div class="thumb">${img}</div>
    <div class="pbody">
      <div class="pname">${p.name}</div>
      <div class="pdesc">${p.desc}</div>
      <div class="prow"><span class="price">${money(p.price)}</span>${action}</div>
    </div>
  </div>`;
}

function renderCatalog(){
  const term = searchTerm.trim().toLowerCase();
  const visible = PRODUCTS.filter(p =>
    (activeCategory === "All" || p.category === activeCategory) &&
    (!term || (p.name + " " + p.desc + " " + p.category).toLowerCase().includes(term))
  );
  if (visible.length === 0){
    $("catalog").innerHTML = `<p class="empty-msg">Nothing matches — try a different search or category.</p>`;
  } else if (activeCategory === "All" && !term){
    $("catalog").innerHTML = CATEGORIES.map(cat => {
      const items = visible.filter(p => p.category === cat);
      if (!items.length) return "";
      return `<div class="section-title">${cat} <small>${items.length} items</small></div>
              <div class="grid">${items.map(productCard).join("")}</div>`;
    }).join("");
  } else {
    $("catalog").innerHTML = `<div class="grid" style="margin-top:14px">${visible.map(productCard).join("")}</div>`;
  }
  bindCardButtons();
  updateBadges();
}

function bindCardButtons(){
  document.querySelectorAll("[data-sku]").forEach(b => b.onclick = e => { e.stopPropagation(); changeQty(b.dataset.sku, +1); });
  document.querySelectorAll("[data-inc]").forEach(b => b.onclick = e => { e.stopPropagation(); changeQty(b.dataset.inc, +1); });
  document.querySelectorAll("[data-dec]").forEach(b => b.onclick = e => { e.stopPropagation(); changeQty(b.dataset.dec, -1); });
  document.querySelectorAll("[data-view]").forEach(c => c.onclick = () => openProduct(c.dataset.view));
}

/* ================= product detail modal ================= */
let pmSku = null, pmImgIdx = 0;

function openProduct(sku){
  pmSku = sku; pmImgIdx = 0;
  renderProductModal();
  document.getElementById("pmodal").classList.add("show");
  document.getElementById("pmOverlay").classList.add("show");
}
function closeProduct(){
  document.getElementById("pmodal").classList.remove("show");
  document.getElementById("pmOverlay").classList.remove("show");
  pmSku = null;
}
document.getElementById("pmClose").onclick = closeProduct;
document.getElementById("pmOverlay").onclick = closeProduct;
document.addEventListener("keydown", e => { if (e.key === "Escape") closeProduct(); });

function renderProductModal(){
  const p = bySku(pmSku); if (!p) return;
  const gallery = (p.images && p.images.length) ? p.images : (p.image ? [p.image] : []);
  const hero = gallery.length
    ? `<img src="${gallery[pmImgIdx]}" alt="${p.name}" onerror="this.outerHTML='<div style=\\'font-size:84px\\'>${p.emoji}</div>'">`
    : p.emoji;
  const thumbs = gallery.length > 1
    ? `<div class="pm-thumbs">${gallery.map((g, i) =>
        `<button data-th="${i}" class="${i === pmImgIdx ? "on" : ""}" aria-label="Photo ${i+1}"><img src="${g}" alt=""></button>`).join("")}</div>`
    : "";
  const benefits = (p.benefits && p.benefits.length)
    ? `<ul class="pm-benefits">${p.benefits.map(b => `<li>${b}</li>`).join("")}</ul>` : "";
  const specs = (p.specs && p.specs.length)
    ? `<table class="pm-specs">${p.specs.map(s => {
        const i = s.indexOf(":");
        const k = i > -1 ? s.slice(0, i) : s, v = i > -1 ? s.slice(i + 1).trim() : "";
        return `<tr><td>${k}</td><td>${v}</td></tr>`;
      }).join("")}</table>` : "";
  const related = PRODUCTS.filter(x => x.category === p.category && x.sku !== p.sku && x.inStock).slice(0, 6);
  const relatedHtml = related.length
    ? `<div class="pm-related"><h3>Goes well with</h3><div class="pm-related-row">${related.map(r => `
        <div class="pm-rel" data-rel="${r.sku}">
          <div class="re">${mainImage(r) ? `<img src="${mainImage(r)}" style="width:100%;border-radius:6px" alt="">` : r.emoji}</div>
          <div class="rn">${r.name}</div>
          <div class="rp">${moneyPlain(r.price)}</div>
        </div>`).join("")}</div></div>`
    : "";
  document.getElementById("pmScroll").innerHTML = `
    <div class="pm-hero">${p.badge ? `<span class="badge-tag">${p.badge}</span>` : ""}${hero}</div>
    ${thumbs}
    <div class="pm-body">
      <h2>${p.name}</h2>
      <div class="pm-cat">${p.category} · ${p.sku}</div>
      <div class="pm-price">${moneyPlain(p.price)}</div>
      <p class="pm-desc">${p.desc || ""}</p>
      ${benefits}
      ${specs}
      <div class="pm-trust">
        <span>🚚 Delivery ${CONFIG.deliveryFee > 0 ? moneyPlain(CONFIG.deliveryFee) : "free"} — ${CONFIG.deliveryAreas[0]} & nearby</span>
        <span>💳 QR transfer or Cash on Delivery</span>
        <span>💬 Questions? WhatsApp us</span>
      </div>
      ${relatedHtml}
    </div>`;
  renderPmBar(p);
  document.querySelectorAll("[data-th]").forEach(b => b.onclick = () => { pmImgIdx = Number(b.dataset.th); renderProductModal(); });
  document.querySelectorAll("[data-rel]").forEach(r => r.onclick = () => { pmSku = r.dataset.rel; pmImgIdx = 0; renderProductModal(); document.getElementById("pmScroll").scrollTop = 0; });
}

function renderPmBar(p){
  const qty = cart[p.sku] || 0;
  document.getElementById("pmBar").innerHTML = !p.inStock
    ? `<button class="pm-add" disabled>Out of stock</button>`
    : qty === 0
      ? `<button class="pm-add" id="pmAdd">Add to basket — ${moneyPlain(p.price)}</button>`
      : `<div class="qty-ctrl">
           <button id="pmDec" aria-label="Remove one">−</button><span>${qty}</span>
           <button id="pmInc" aria-label="Add one">+</button>
         </div>
         <button class="pm-add" id="pmGo">View basket (${moneyPlain(totals().sub)})</button>`;
  const add = document.getElementById("pmAdd");
  if (add) add.onclick = () => { changeQty(p.sku, +1); renderPmBar(p); };
  const inc = document.getElementById("pmInc");
  if (inc) inc.onclick = () => { changeQty(p.sku, +1); renderPmBar(p); };
  const dec = document.getElementById("pmDec");
  if (dec) dec.onclick = () => { changeQty(p.sku, -1); renderPmBar(p); };
  const go = document.getElementById("pmGo");
  if (go) go.onclick = () => { closeProduct(); openDrawer("cart"); };
}

function changeQty(sku, d){
  cart[sku] = (cart[sku] || 0) + d;
  if (cart[sku] <= 0) delete cart[sku];
  saveCart(); renderCatalog();
  if ($("drawer").classList.contains("show") && drawerMode === "cart") renderDrawer();
}

/* ================= totals ================= */
function totals(){
  let sub = 0, count = 0;
  for (const [sku, q] of Object.entries(cart)){
    const p = bySku(sku); if (!p) continue;
    sub += p.price * q; count += q;
  }
  return { sub, count, fee: CONFIG.deliveryFee, grand: sub + (sub > 0 ? CONFIG.deliveryFee : 0) };
}

function updateBadges(){
  const t = totals();
  $("cartCount").textContent = t.count;
  $("footbar").hidden = t.count === 0;
  if (t.count > 0) $("footNote").textContent = `${t.count} item${t.count>1?"s":""} · ${moneyPlain(t.sub)}`;
}

/* ================= drawer ================= */
function openDrawer(mode){
  drawerMode = mode || "cart";
  renderDrawer();
  $("drawer").classList.add("show");
  $("overlay").classList.add("show");
}
function closeDrawer(){
  $("drawer").classList.remove("show");
  $("overlay").classList.remove("show");
}
$("cartBtn").onclick = () => openDrawer("cart");
$("footGo").onclick = () => openDrawer("cart");
$("closeDrawer").onclick = closeDrawer;
$("overlay").onclick = closeDrawer;

function renderDrawer(){
  if (drawerMode === "cart") renderCartView();
  else if (drawerMode === "checkout") renderCheckout();
  else renderConfirm();
}

function renderCartView(){
  $("drawerTitle").textContent = "Your basket";
  const t = totals();
  if (t.count === 0){
    $("drawerBody").innerHTML = `<p class="empty-msg">Your basket is empty.</p>`;
    $("drawerFoot").innerHTML = "";
    return;
  }
  $("drawerBody").innerHTML = Object.entries(cart).map(([sku, q]) => {
    const p = bySku(sku); if (!p) return "";
    return `<div class="citem">
      <div class="ci-emoji">${p.emoji}</div>
      <div class="ci-info">
        <div class="ci-name">${p.name}</div>
        <div class="ci-price">${moneyPlain(p.price)} each</div>
        <button class="remove" data-rm="${sku}">Remove</button>
      </div>
      <div class="qty-ctrl">
        <button data-dec2="${sku}" aria-label="Remove one">−</button>
        <span>${q}</span>
        <button data-inc2="${sku}" aria-label="Add one">+</button>
      </div>
    </div>`;
  }).join("");
  const below = CONFIG.minimumOrder > 0 && t.sub < CONFIG.minimumOrder;
  $("drawerFoot").innerHTML = `
    <div class="totline"><span>Subtotal</span><span>${moneyPlain(t.sub)}</span></div>
    <div class="totline"><span>Delivery</span><span>${t.fee > 0 ? moneyPlain(t.fee) : "Free"}</span></div>
    <div class="totline grand"><span>Total</span><span>${moneyPlain(t.grand)}</span></div>
    ${below ? `<div class="warn">Minimum order for delivery is ${moneyPlain(CONFIG.minimumOrder)} — add ${moneyPlain(CONFIG.minimumOrder - t.sub)} more.</div>` : ""}
    <button class="primary" id="toCheckout" ${below ? "disabled" : ""}>Checkout</button>`;
  $("drawerBody").querySelectorAll("[data-rm]").forEach(b => b.onclick = () => { delete cart[b.dataset.rm]; saveCart(); renderCatalog(); renderCartView(); });
  $("drawerBody").querySelectorAll("[data-inc2]").forEach(b => b.onclick = () => changeQty(b.dataset.inc2, +1));
  $("drawerBody").querySelectorAll("[data-dec2]").forEach(b => b.onclick = () => changeQty(b.dataset.dec2, -1));
  const btn = $("toCheckout");
  if (btn) btn.onclick = () => { drawerMode = "checkout"; renderDrawer(); };
}

/* ================= checkout ================= */
let payMethod = "QR Transfer";
function renderCheckout(){
  $("drawerTitle").textContent = "Checkout";
  const t = totals();
  $("drawerBody").innerHTML = `
    <div class="field"><label for="fName">Your name</label>
      <input id="fName" autocomplete="name" placeholder="Full name"></div>
    <div class="field"><label for="fPhone">Phone (WhatsApp/Viber)</label>
      <input id="fPhone" autocomplete="tel" inputmode="tel" placeholder="7XXXXXX"></div>
    <div class="field"><label for="fArea">Delivery area</label>
      <select id="fArea">${CONFIG.deliveryAreas.map(a => `<option>${a}</option>`).join("")}</select></div>
    <div class="field"><label for="fAddr">Address</label>
      <textarea id="fAddr" rows="2" placeholder="Building, floor, street"></textarea></div>
    <div class="field"><label>Payment</label>
      <div class="paychoice">
        <button id="payQR" class="${payMethod==="QR Transfer"?"on":""}">QR Transfer</button>
        <button id="payCOD" class="${payMethod==="Cash on Delivery"?"on":""}">Cash on Delivery</button>
      </div></div>`;
  $("payQR").onclick = () => { payMethod = "QR Transfer"; renderCheckout(); };
  $("payCOD").onclick = () => { payMethod = "Cash on Delivery"; renderCheckout(); };
  $("drawerFoot").innerHTML = `
    <div class="totline grand"><span>Total</span><span>${moneyPlain(t.grand)}</span></div>
    <button class="primary" id="placeOrder">Place order</button>
    <button class="primary" id="backToCart" style="background:none;color:var(--teal);margin-top:6px">← Back to basket</button>`;
  $("backToCart").onclick = () => { drawerMode = "cart"; renderDrawer(); };
  $("placeOrder").onclick = placeOrder;
}

function placeOrder(){
  const name = $("fName").value.trim();
  const phone = $("fPhone").value.trim();
  const area = $("fArea").value;
  const addr = $("fAddr").value.trim();
  if (!name || !phone || !addr){ alert("Please fill in your name, phone, and address."); return; }

  const t = totals();
  const orderNo = "ORD-" + Date.now().toString(36).toUpperCase().slice(-6);
  const lines = Object.entries(cart).map(([sku, q]) => {
    const p = bySku(sku);
    return `• ${p.name} x${q} — ${moneyPlain(p.price * q)}`;
  });
  const msg = [
    `🧾 New order ${orderNo}`,
    ``, ...lines, ``,
    `Subtotal: ${moneyPlain(t.sub)}`,
    `Delivery: ${moneyPlain(t.fee)}`,
    `Total: ${moneyPlain(t.grand)}`,
    ``,
    `Name: ${name}`,
    `Phone: ${phone}`,
    `Area: ${area}`,
    `Address: ${addr}`,
    `Payment: ${payMethod}`,
  ].join("\n");

  lastOrder = { orderNo, msg, method: payMethod };
  cart = {}; saveCart(); renderCatalog();
  drawerMode = "confirm"; renderDrawer();
}

/* ================= confirmation ================= */
function renderConfirm(){
  $("drawerTitle").textContent = "Order placed";
  const o = lastOrder;
  const wa = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(o.msg)}`;
  const qr = (o.method === "QR Transfer" && CONFIG.qrImage)
    ? `<div class="qrbox"><img src="${CONFIG.qrImage}" alt="Payment QR code"
         onerror="this.parentElement.innerHTML='<p style=\\'padding:14px;font-size:13px;color:var(--ink-soft)\\'>QR image not found — pay via the details we send on WhatsApp.</p>'"></div>
       <p><strong>${CONFIG.accountName}</strong><br>Use <strong>${o.orderNo}</strong> as the transfer reference.</p>`
    : "";
  $("drawerBody").innerHTML = `
    <div class="confirm">
      <div class="big">✅</div>
      <h3>Almost done!</h3>
      <div class="ordernum">${o.orderNo}</div>
      <p>Tap the button below to send your order to us on WhatsApp — your order isn't received until you send it.</p>
      ${qr}
      <p>${CONFIG.paymentNote}</p>
      <a class="wa" href="${wa}" target="_blank" rel="noopener">Send order on WhatsApp</a>
    </div>`;
  $("drawerFoot").innerHTML = `<button class="primary" id="doneBtn" style="background:none;color:var(--teal)">Continue shopping</button>`;
  $("doneBtn").onclick = () => { closeDrawer(); drawerMode = "cart"; };
}

/* ================= search ================= */
$("search").addEventListener("input", e => { searchTerm = e.target.value; renderCatalog(); });

/* ================= init ================= */
renderChips();
renderCatalog();
</script>
</body>
</html>
